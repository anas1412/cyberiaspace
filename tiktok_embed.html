<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Unified Social Embed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <style>
        body {
            margin: 0;
            background: #0b0b0f;
            color: #eaeaf0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 540px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 20px;
        }

        input,
        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
        }

        input {
            background: #1b1b23;
            color: #fff;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(135deg, #ff0050, #ff3b7f);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .embed-wrap {
            margin-top: 16px;
            border-radius: 16px;
            overflow: hidden;
        }

        blockquote {
            margin: 0 !important;
        }

        .fallback {
            background: #14141a;
            border: 1px solid #23232e;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            color: #a1a1b3;
        }

        .fallback a {
            color: #ff0050;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }

        .hint {
            margin-top: 10px;
            font-size: 12px;
            color: #a1a1b3;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="app">
        <h1>Unified Embed</h1>
        <input id="url" placeholder="Paste TikTok / Instagram / X link…" />
        <button onclick="embed()">Embed</button>

        <div id="out"></div>
        <div class="hint">TikTok · Instagram · X (Twitter)</div>
    </div>

    <script>
        function embed() {
            const url = document.getElementById("url").value.trim();
            const out = document.getElementById("out");

            if (!url) return;

            out.innerHTML = "";

            // TikTok — OFFICIAL WHITE EMBED (most reliable)
            if (url.includes("tiktok.com")) {
                out.innerHTML = `
          <div class="embed-wrap">
            <blockquote
              class="tiktok-embed"
              cite="${url}"
              style="max-width: 100%; min-width: 325px;">
              <section></section>
            </blockquote>
          </div>
        `;
                loadScript("https://www.tiktok.com/embed.js");
                return;
            }

            // Instagram — OFFICIAL EMBED (NO IFRAME)
            if (url.includes("instagram.com")) {
                out.innerHTML = `
          <div class="embed-wrap">
            <blockquote
              class="instagram-media"
              data-instgrm-permalink="${url}"
              data-instgrm-version="14">
            </blockquote>
          </div>
        `;
                loadScript("https://www.instagram.com/embed.js");
                return;
            }

            // X / Twitter — OFFICIAL WIDGET
            if (url.includes("twitter.com") || url.includes("x.com")) {
                out.innerHTML = `
          <div class="embed-wrap">
            <blockquote class="twitter-tweet">
              <a href="${url}"></a>
            </blockquote>
          </div>
        `;
                loadScript("https://platform.twitter.com/widgets.js");
                return;
            }

            // Unsupported
            out.innerHTML = `
        <div class="fallback">
          Unsupported link<br/>
          <a href="${url}" target="_blank">Open link →</a>
        </div>
      `;
        }

        function loadScript(src) {
            const id = btoa(src);
            let script = document.getElementById(id);
            if (script) script.remove();

            script = document.createElement("script");
            script.id = id;
            script.src = src;
            script.async = true;
            document.body.appendChild(script);
        }
    </script>

</body>

</html>
