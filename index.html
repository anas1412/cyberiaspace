  <title>Cyberia Space - AI-Powered Visual Workspace</title>
  
  <script>
    // Critical: Blocking script to prevent white flash and set theme before render
    (function() {
      try {
        const stored = localStorage.getItem('cyberia-theme');
        const theme = stored || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        
        // Define CSS variables immediately for preloader to use
        const isLight = theme === 'light';
        const root = document.documentElement;
        root.style.setProperty('--bg-page', isLight ? '#e2e8f0' : '#05060a');
        root.style.setProperty('--text-primary', isLight ? '#0f172a' : '#f8fafc');
        root.style.setProperty('--accent', '#6366f1');
        root.style.setProperty('--glass-border', isLight ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.08)');
        // Set ambient glow to match LoadingOverlay
        const ambientGradient = isLight
          ? 'radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(79, 70, 229, 0.08) 0%, transparent 50%)'
          : 'radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(129, 140, 248, 0.08) 0%, transparent 50%)';
        root.style.setProperty('--bg-ambient', ambientGradient);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  
  <style>
    /* These styles use the variables defined in your global CSS */
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-page, #05060a);
    }

    .preloader-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-page, #05060a);
      z-index: 9999;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .preloader-ambient {
      position: absolute;
      inset: 0;
      background: var(--bg-ambient, radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(129, 140, 248, 0.08) 0%, transparent 50%));
      opacity: 0.3;
      pointer-events: none;
    }

    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .preloader-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary, #e2e8f0);
      text-transform: uppercase;
    }

    .preloader-title span {
      color: var(--accent, #6366f1);
    }

    .preloader-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--glass-border, rgba(255,255,255,0.1));
      border-top-color: var(--accent, #6366f1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- This is the 'Shell' loader shown before React hydration -->
    <div class="preloader-wrapper">
      <div class="preloader-ambient"></div>
      <div class="preloader-content">
        <div class="preloader-title">Cyberia<span> Space</span></div>
        <div class="preloader-spinner"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
