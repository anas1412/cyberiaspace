  <style>
    body {
      margin: 0;
      padding: 0;
      background: #05060a;
    }

    .preloader-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #05060a;
      z-index: 9999;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .preloader-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: #e2e8f0;
      text-transform: uppercase;
    }

    .preloader-title span {
      color: #6366f1;
    }

    .preloader-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(226, 232, 240, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
